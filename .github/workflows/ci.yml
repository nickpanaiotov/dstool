name: ci

# Doc-only changes don't need the (heavy) native build.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  build:
    name: build + smoke (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: macos-arm64
          - runner: ubuntu-latest
            label: linux-x86_64
    steps:
      - uses: actions/checkout@v5

      # Oracle GraalVM (download.oracle.com) — its CDN is reliable; the
      # graalvm-community assets on GitHub's release CDN intermittently 504.
      # CI produces no distributed artifact, so the toolchain choice here has
      # no licensing impact on releases.
      - name: Set up GraalVM 25 (Oracle)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Unit tests (JVM, software PKCS#12 key)
        run: ./mvnw -ntp test

      - name: Build native binary
        run: ./mvnw -Pnative -ntp -DskipTests package

      - name: Smoke test (no card required)
        run: |
          set -euo pipefail
          ./target/dstool --version
          ./target/dstool --help
          ./target/dstool sign --help
          # missing driver must exit 3
          ./target/dstool list-keys --pkcs11-lib /nonexistent.so && exit 1 || test $? -eq 3
          echo "smoke OK"
